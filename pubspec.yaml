name: muslim_ku
description: Flutter UI prototype for a Muslim companion app with Adzan and Al-Qur'an flows.
publish_to: 'none'
version: 0.1.0+6

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.6.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.0.0
  flutter_timezone: ^5.0.2
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_sign_in: ^7.2.0
  http: ^1.6.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  local_auth: ^2.3.0
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  speech_to_text: ^7.3.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/adhan/
    - assets/Logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Logo/Logo Muslimku.png"
  adaptive_icon_background: "#0D3B24"
  adaptive_icon_foreground: "assets/Logo/Logo Muslimku.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D3B24"
  image: "assets/Logo/Logo Muslimku.png"
  fullscreen: true
  android: true
  ios: true
  web: false
  android_12:
    color: "#0D3B24"
    image: "assets/Logo/Logo Muslimku.png"
