name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase Android config
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON secret is required."
            exit 1
          fi
          cat <<'EOF' > android/app/google-services.json
          ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          EOF

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          SAFE_VERSION=${VERSION//+/-build-}
          echo "value=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build universal release APK
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        run: flutter build apk --release

      - name: Build split ABI release APKs
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
        run: flutter build apk --release --split-per-abi

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/muslimku-${{ steps.version.outputs.value }}-universal.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/muslimku-${{ steps.version.outputs.value }}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/muslimku-${{ steps.version.outputs.value }}-armeabi-v7a.apk"
          if [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-x86_64-release.apk "dist/muslimku-${{ steps.version.outputs.value }}-x86_64.apk"
          fi
          ls -lh dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: muslimku-android-release-${{ steps.version.outputs.value }}
          path: dist/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
