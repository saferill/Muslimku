name: iOS Release Template

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios-release-template:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required iOS secrets
        id: secrets_check
        shell: bash
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          if [ -z "$IOS_CERTIFICATE_P12_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ] || [ -z "$IOS_EXPORT_OPTIONS_PLIST_BASE64" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets are not configured. Skipping iOS release build."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        if: steps.secrets_check.outputs.ready == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase iOS config
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          if [ -n "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" ]; then
            echo "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi

      - name: Install signing certificate
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign

      - name: Install provisioning profile
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Restore export options
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          echo "${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}" | base64 --decode > ios/ExportOptions.plist

      - name: Flutter pub get
        if: steps.secrets_check.outputs.ready == 'true'
        run: flutter pub get

      - name: Build IPA
        if: steps.secrets_check.outputs.ready == 'true'
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: muslimku-ios-ipa
          path: build/ios/ipa/*.ipa
